<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Class 10Edu</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page-layout">
  <aside class="sidebar" id="sb"></aside>
  <main class="main-area">
    <header class="header">
      <h1>Admin Panel</h1>
      <p style="color:var(--ink-secondary)">Manage system content and configuration.</p>
    </header>

    <div style="display:grid;grid-template-columns:240px 1fr;gap:32px;align-items:flex-start">
      <div class="content-card" style="padding:16px">
        <nav id="adminNavLinks" class="nav-group"></nav>
      </div>
      <div id="adminPanels">
        <!-- Panels will be dynamically generated here -->
      </div>
    </div>
  </main>
</div>

<script src="js/app.js"></script>
<script src="js/security.js"></script>
<script src="js/admin.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  App.initPage('admin');
  Admin.init();
});
</script>
</body>
</html>
